name: Build desktop binaries
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # No setup-python step for the bundled runtime itself — the build script
      # downloads python-build-standalone and bundles it into the installer.

      - name: Build desktop binary (Windows)
        shell: pwsh
        working-directory: desktop
        run: .\build.ps1 -Targets win

      - uses: actions/upload-artifact@v4
        with:
          name: ledgerly-${{ matrix.os }}
          path: |
            desktop/dist/*.exe
          if-no-files-found: ignore
