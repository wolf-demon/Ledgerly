name: Build desktop binaries
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: macos-latest
            target: mac
          - os: ubuntu-latest
            target: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # No setup-python step — the build script downloads python-build-standalone
      # and bundles it into the installer.

      - name: Build desktop binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: desktop
        run: .\build.ps1 -Targets ${{ matrix.target }}

      - name: Build desktop binary (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        working-directory: desktop
        run: ./build.sh ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ledgerly-${{ matrix.os }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.AppImage
          if-no-files-found: ignore
