name: Build & Release Desktop

# Triggered on tag push (v1.0.0, v1.2.3-beta.1, ...) — produces installers
# for Windows + macOS + Linux, then attaches them all to a single GitHub Release.
#
# Architecture:
#   1. Three parallel `build` jobs (one per OS) produce installers and upload
#      them as workflow artifacts. These jobs use --publish never so they don't
#      fight over the release upload.
#   2. A `release` job runs only on tag push, downloads every build artifact,
#      and attaches them to a GitHub Release in one shot using
#      softprops/action-gh-release.
#
# Quick usage:
#   git tag v1.0.1
#   git push origin v1.0.1
#
# Required repo secrets:
#   GITHUB_TOKEN              auto-provided by Actions, no setup needed.
#
# Optional macOS code-signing (recommended — without these, macOS users see
# Gatekeeper warnings and auto-update on Mac will not work):
#   APPLE_CERT_P12              base64-encoded Developer ID Application .p12
#   APPLE_CERT_PASSWORD         password for the .p12
#   APPLE_ID                    your Apple ID email
#   APPLE_APP_SPECIFIC_PASSWORD app-specific password from appleid.apple.com
#   APPLE_TEAM_ID               10-char Team ID
#
# Optional Windows code-signing:
#   WINDOWS_CERT_P12            base64-encoded Authenticode .pfx
#   WINDOWS_CERT_PASSWORD       password for the .pfx

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write   # needed by the release job to create a Release

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            label: Windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install yarn
        shell: bash
        run: npm install -g yarn

      # Ubuntu 22.04 ships libfuse3 but AppImage runtime needs libfuse2.
      # ---- Bundled Python runtime ---------------------------------------
      - name: Download Python runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: desktop
        run: ./scripts/download-python.ps1 -Target win

      # ---- Frontend build -----------------------------------------------
      - name: Build frontend
        shell: bash
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://127.0.0.1:8001
        run: |
          yarn install
          yarn build

      - name: Install desktop deps
        shell: bash
        working-directory: desktop
        run: yarn install

      # ---- macOS code-signing setup (only when secret is set) -----------
      # GitHub Actions' `if:` evaluator can't read `secrets.*` directly, so we
      # promote the secret to a job-level env var first and check that.
      - name: Detect Apple cert availability
        if: runner.os == 'macOS'
        id: apple_cert
        run: |
          if [ -n "${{ secrets.APPLE_CERT_P12 }}" ]; then
            echo "have_cert=true" >> $GITHUB_OUTPUT
          else
            echo "have_cert=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Import Apple certificate
        if: runner.os == 'macOS' && steps.apple_cert.outputs.have_cert == 'true'
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN=$RUNNER_TEMP/build.keychain
          echo "$APPLE_CERT_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p actions $KEYCHAIN
          security default-keychain -s $KEYCHAIN
          security unlock-keychain -p actions $KEYCHAIN
          security import $RUNNER_TEMP/cert.p12 -k $KEYCHAIN -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions $KEYCHAIN
          rm $RUNNER_TEMP/cert.p12

      # ---- Build (NO publish — uploaded as workflow artifacts below) ----
      - name: Package installer
        shell: pwsh
        working-directory: desktop
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          yarn dist:win

      # ---- Always upload artifacts so you can grab them from the run ----
      - name: Upload installers
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ledgerly-${{ matrix.label }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.blockmap
            desktop/dist/latest*.yml
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: List downloaded artifacts (debug)
        run: |
          echo "Contents of ./artifacts/:"
          ls -lhR artifacts/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.blockmap
            artifacts/**/latest*.yml
